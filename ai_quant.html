<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI量化预测系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117; --card: #1a1d27; --card-hover: #22252f; --border: #2a2d3a;
  --text: #e0e0e0; --text-dim: #8892a4; --green: #00e676; --red: #ff5252;
  --amber: #ffab00; --blue: #448aff; --purple: #b388ff; --radius: 10px;
}
body { font-family: 'SF Mono', 'Consolas', monospace; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; max-width: 1400px; margin: 0 auto; }
h1 { font-size: 28px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--blue); }

.nav-bar { display: flex; gap: 12px; margin-bottom: 24px; }
.nav-btn { padding: 10px 20px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
.nav-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.nav-btn.cta { background: var(--green); }
.nav-btn.back { background: var(--text-dim); }

.card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.stat-value { font-size: 28px; font-weight: 700; margin: 8px 0; }
.stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.stat-positive { color: var(--green); }
.stat-negative { color: var(--red); }
.stat-amber { color: var(--amber); }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { padding: 12px 16px; text-align: left; color: var(--text-dim); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--card-hover); }

.badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
.badge-buy { background: rgba(0,230,118,0.15); color: var(--green); }
.badge-sell { background: rgba(255,82,82,0.15); color: var(--red); }
.badge-hold { background: rgba(255,171,0,0.15); color: var(--amber); }

.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
.btn-buy { background: var(--green); color: #000; }
.btn-sell { background: var(--red); color: #fff; }
.btn:hover { opacity: 0.85; }

.chart-container { position: relative; height: 300px; margin-top: 16px; }
.positive { color: var(--green); }
.negative { color: var(--red); }

.empty { text-align: center; padding: 40px; color: var(--text-dim); }
.update-time { text-align: right; color: var(--text-dim); font-size: 12px; margin-bottom: 16px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>

// 统计卡片
function renderStats() {
  const s = AI_DATA.summary;
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">总资产</div>
      <div class="stat-value">¥${s.current_value.toLocaleString()}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">总收益</div>
      <div class="stat-value ${s.total_return >= 0 ? 'stat-positive' : 'stat-negative'}">${s.total_return >= 0 ? '+' : ''}${s.total_return.toFixed(2)}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">胜率</div>
      <div class="stat-value stat-amber">${s.win_rate.toFixed(1)}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">持仓数</div>
      <div class="stat-value">${s.positions_count}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">可用资金</div>
      <div class="stat-value">¥${s.capital.toLocaleString()}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最大回撤</div>
      <div class="stat-value stat-negative">${s.max_drawdown.toFixed(2)}%</div>
    </div>
  `;
}

// 预测表格
function renderPredictions() {
  const tbody = document.getElementById('predictionsTable');
  if (AI_DATA.predictions.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无预测数据，请先运行训练和预测</td></tr>';
    return;
  }
  tbody.innerHTML = AI_DATA.predictions.map((p, i) => {
    const signal = p.score > 0.02 ? 'BUY' : (p.score < -0.02 ? 'SELL' : 'HOLD');
    const signalClass = signal === 'BUY' ? 'badge-buy' : (signal === 'SELL' ? 'badge-sell' : 'badge-hold');
    return `
      <tr>
        <td>${i + 1}</td>
        <td>${p.code}</td>
        <td>${p.name}</td>
        <td>${p.score.toFixed(4)}</td>
        <td>¥${p.price.toFixed(2)}</td>
        <td><span class="badge ${signalClass}">${signal}</span></td>
        <td><button class="btn btn-buy" onclick="handleBuy('${p.code}', '${p.name}', ${p.price})">买入</button></td>
      </tr>
    `;
  }).join('');
}

// 持仓表格
function renderPositions() {
  const tbody = document.getElementById('positionsTable');
  if (AI_DATA.positions.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无持仓</td></tr>';
    return;
  }
  const today = new Date().toISOString().split('T')[0];
  tbody.innerHTML = AI_DATA.positions.map(p => {
    const canSell = p.buy_date < today;
    const status = canSell ? '<span class="badge badge-sell">可卖</span>' : '<span class="badge badge-hold">T+1</span>';
    return `
      <tr>
        <td>${p.code}</td>
        <td>${p.name}</td>
        <td>${p.qty}股</td>
        <td>¥${p.buy_price.toFixed(2)}</td>
        <td>${p.buy_date}</td>
        <td>${status}</td>
        <td>${canSell ? `<button class="btn btn-sell" onclick="handleSell('${p.code}')">卖出</button>` : ''}</td>
      </tr>
    `;
  }).join('');
}

// 交易记录
function renderTrades() {
  const tbody = document.getElementById('tradesTable');
  if (AI_DATA.trades.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无交易记录</td></tr>';
    return;
  }
  tbody.innerHTML = AI_DATA.trades.slice().reverse().map(t => {
    const profit = t.profit !== undefined ? `<span class="${t.profit >= 0 ? 'positive' : 'negative'}">${t.profit >= 0 ? '+' : ''}${t.profit.toFixed(2)}</span>` : '-';
    return `
      <tr>
        <td>${t.date}</td>
        <td><span class="badge ${t.type === 'BUY' ? 'badge-buy' : 'badge-sell'}">${t.type}</span></td>
        <td>${t.code}</td>
        <td>${t.name}</td>
        <td>¥${t.price.toFixed(2)}</td>
        <td>${t.qty}股</td>
        <td>${profit}</td>
      </tr>
    `;
  }).join('');
}

// 净值曲线
function renderChart() {
  const ctx = document.getElementById('valueChart').getContext('2d');
  const data = AI_DATA.dailyValues;
  
  if (data.length === 0) {
    ctx.fillStyle = '#8892a4';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', ctx.canvas.width / 2, ctx.canvas.height / 2);
    return;
  }
  
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        label: '总资产',
        data: data.map(d => d.value),
        borderColor: '#448aff',
        backgroundColor: 'rgba(68,138,255,0.1)',
        fill: true,
        tension: 0.4,
        pointRadius: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
      },
      scales: {
        x: { 
          grid: { color: '#2a2d3a' },
          ticks: { color: '#8892a4', maxTicksLimit: 10 }
        },
        y: { 
          grid: { color: '#2a2d3a' },
          ticks: { color: '#8892a4', callback: v => '¥' + v.toLocaleString() }
        }
      }
    }
  });
}

// 买入操作
function handleBuy(code, name, price) {
  alert(`买入 ${name}(${code}) @ ¥${price.toFixed(2)}\n\n请运行命令:\npython ai_quant/update_ai.py --buy`);
}

// 卖出操作
function handleSell(code) {
  alert(`卖出 ${code}\n\n请运行命令:\npython ai_quant/update_ai.py --sell ${code}`);
}

// 初始化
renderStats();
renderPredictions();
renderPositions();
renderTrades();
renderChart();
